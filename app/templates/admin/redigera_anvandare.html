{% extends "base.html" %}
{% block title %}Redigera användare{% endblock %}
{% block content %}
<h2>Redigera {{ user.username }}</h2>

<form method="POST" class="col-md-6">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label class="form-label">Användarnamn</label>
        <input type="text" class="form-control" value="{{ user.username }}" disabled>
    </div>
    <div class="mb-3">
        <label for="full_name" class="form-label">Fullständigt namn *</label>
        <input type="text" class="form-control" id="full_name" name="full_name"
               value="{{ user.full_name }}" required maxlength="200">
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">E-post</label>
        <input type="email" class="form-control" id="email" name="email"
               value="{{ user.email or '' }}" maxlength="200">
    </div>
    <div class="mb-3">
        <label for="role" class="form-label">Roll *</label>
        <select class="form-select" id="role" name="role" required>
            <option value="handlaggare" {{ 'selected' if user.role == 'handlaggare' }}>Handläggare</option>
            <option value="registrator" {{ 'selected' if user.role == 'registrator' }}>Registrator</option>
            <option value="arkivarie" {{ 'selected' if user.role == 'arkivarie' }}>Arkivarie</option>
            <option value="admin" {{ 'selected' if user.role == 'admin' }}>Administratör</option>
            <option value="observator" {{ 'selected' if user.role == 'observator' }}>Observatör</option>
        </select>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="active" name="active" {{ 'checked' if user.active }}>
        <label class="form-check-label" for="active">Aktiv</label>
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="maste_byta_losenord"
               name="maste_byta_losenord" {{ 'checked' if user.maste_byta_losenord }}>
        <label class="form-check-label" for="maste_byta_losenord">
            Kräv lösenordsbyte vid nästa inloggning
        </label>
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Nytt lösenord</label>
        <input type="password" class="form-control" id="password" name="password" minlength="6">
        <div class="form-text">Lämna tomt för att behålla nuvarande lösenord.</div>
    </div>
    <button type="submit" class="btn btn-primary">Spara</button>
    <a href="{{ url_for('admin.anvandare') }}" class="btn btn-secondary">Avbryt</a>
</form>

{% if user.id != current_user.id %}
<hr class="my-4 col-md-6">
<form method="POST"
      action="{{ url_for('admin.ta_bort_anvandare', user_id=user.id) }}"
      class="col-md-6"
      onsubmit="return confirm('Ta bort {{ user.username }}? Åtgärden loggas och kontot kan inte återaktiveras härifrån.')">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <button type="submit" class="btn btn-danger">
        <i class="bi bi-trash"></i> Ta bort användare
    </button>
</form>
{% endif %}
{% endblock %}
