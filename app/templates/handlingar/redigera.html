{% extends "base.html" %}
{% block title %}Redigera handling #{{ handling.id }}{% endblock %}
{% block content %}
<h2>Redigera handling #{{ handling.id }}</h2>
<p>
    <a href="{{ url_for('handlingar.visa', handling_id=handling.id) }}">
        &larr; Tillbaka till handlingen
    </a>
</p>

<form method="POST" class="col-md-8">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
        <label for="typ" class="form-label">Typ *</label>
        <select class="form-select" id="typ" name="typ" required>
            <option value="inkommande" {{ 'selected' if handling.typ == 'inkommande' }}>Inkommande</option>
            <option value="utgaende" {{ 'selected' if handling.typ == 'utgaende' }}>Utgående</option>
            <option value="upprattad" {{ 'selected' if handling.typ == 'upprattad' }}>Upprättad</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="beskrivning" class="form-label">Beskrivning *</label>
        <input type="text" class="form-control" id="beskrivning" name="beskrivning"
               value="{{ handling.beskrivning }}" required maxlength="500">
    </div>
    <div class="mb-3">
        <label for="datum_inkom" class="form-label">Datum</label>
        <input type="date" class="form-control" id="datum_inkom" name="datum_inkom"
               value="{{ handling.datum_inkom.strftime('%Y-%m-%d') if handling.datum_inkom else '' }}"
               style="max-width: 200px;">
    </div>
    <div class="mb-3">
        <label for="avsandare" class="form-label">Avsändare</label>
        <input type="text" class="form-control" id="avsandare" name="avsandare"
               value="{{ handling.avsandare or '' }}" maxlength="300">
    </div>
    <div class="mb-3">
        <label for="mottagare" class="form-label">Mottagare</label>
        <input type="text" class="form-control" id="mottagare" name="mottagare"
               value="{{ handling.mottagare or '' }}" maxlength="300">
    </div>
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="sekretess" name="sekretess"
               {{ 'checked' if handling.sekretess }}>
        <label class="form-check-label" for="sekretess">Sekretess</label>
    </div>
    {% if kategorier %}
    <div class="mb-3">
        <label class="form-label">Kategori</label>
        <div>
            {% for k in kategorier %}
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="kategorier"
                       value="{{ k.id }}" id="kategori_{{ k.id }}"
                       {{ 'checked' if k.id in valda_ids }}>
                <label class="form-check-label" for="kategori_{{ k.id }}">{{ k.namn }}</label>
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}
    <button type="submit" class="btn btn-primary">Spara</button>
    <a href="{{ url_for('handlingar.visa', handling_id=handling.id) }}" class="btn btn-secondary">Avbryt</a>
</form>
{% endblock %}
